<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte à rebours ConcProf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Cairo:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    height:100%;
    background:transparent;
    font-family:'Outfit','Cairo',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .cw{
    width:100%;
    max-width:860px;
    margin:0 auto;
    background:linear-gradient(160deg,#0a0a1a 0%,#111133 40%,#0f3460 70%,#111133 100%);
    border-radius:20px;
    padding:clamp(20px,4vw,40px) clamp(14px,3vw,36px);
    text-align:center;
    border:1px solid rgba(255,202,40,0.15);
    box-shadow:0 0 60px rgba(15,52,96,0.4),inset 0 0 60px rgba(100,181,246,0.03);
    position:relative;
    overflow:hidden;
  }
  .cw::before{
    content:'';position:absolute;width:280px;height:280px;
    background:radial-gradient(circle,rgba(100,181,246,0.08),transparent 70%);
    top:-100px;right:-80px;border-radius:50%;
  }
  .cw::after{
    content:'';position:absolute;width:220px;height:220px;
    background:radial-gradient(circle,rgba(255,202,40,0.06),transparent 70%);
    bottom:-80px;left:-60px;border-radius:50%;
  }
  .badge{
    display:inline-flex;align-items:center;
    background:rgba(239,68,68,0.12);
    border:1px solid rgba(239,68,68,0.3);
    border-radius:50px;padding:5px 16px;
    margin-bottom:clamp(10px,2vw,18px);
    position:relative;z-index:1;
  }
  .dot{
    width:9px;height:9px;background:#ef4444;border-radius:50%;
    margin-right:8px;
    animation:pulse 1.5s ease-in-out infinite;
    box-shadow:0 0 10px rgba(239,68,68,0.6);
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.4;transform:scale(.75)}
  }
  .badge span{
    color:#ef4444;font-weight:700;
    font-size:clamp(0.65rem,1.4vw,0.8rem);
    letter-spacing:2px;text-transform:uppercase;
  }
  .t1{
    color:#fff;font-weight:900;
    font-size:clamp(1rem,3vw,1.6rem);
    line-height:1.4;margin-bottom:6px;
    text-shadow:0 0 25px rgba(255,255,255,0.08);
    position:relative;z-index:1;
  }
  .t2{
    color:#FFCA28;font-weight:800;
    font-size:clamp(0.8rem,2.2vw,1.1rem);
    margin-bottom:clamp(16px,3vw,28px);
    text-shadow:0 0 18px rgba(255,202,40,0.25);
    position:relative;z-index:1;
    direction:rtl;
  }
  .boxes{
    display:flex;justify-content:center;
    gap:clamp(6px,1.8vw,16px);
    flex-wrap:nowrap;
    margin-bottom:clamp(16px,3vw,26px);
    position:relative;z-index:1;
  }
  .tb{
    background:linear-gradient(165deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:clamp(10px,2vw,20px) clamp(10px,2vw,24px);
    min-width:clamp(60px,12vw,110px);
    box-shadow:0 8px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.07);
  }
  .tb.hl{
    background:linear-gradient(165deg,rgba(255,202,40,0.1),rgba(255,202,40,0.02));
    border-color:rgba(255,202,40,0.25);
    box-shadow:0 8px 24px rgba(0,0,0,0.3),0 0 18px rgba(255,202,40,0.07),inset 0 1px 0 rgba(255,255,255,0.07);
  }
  .num{
    font-size:clamp(1.6rem,5vw,3rem);
    font-weight:900;color:#fff;line-height:1.1;
    font-variant-numeric:tabular-nums;
  }
  .tb.hl .num{
    color:#FFCA28;
    text-shadow:0 0 20px rgba(255,202,40,0.25);
  }
  .lbl{
    color:rgba(255,255,255,0.45);
    font-size:clamp(0.55rem,1.2vw,0.75rem);
    font-weight:600;text-transform:uppercase;
    letter-spacing:1.5px;margin-top:4px;
  }
  .sep{
    display:flex;align-items:center;
    color:rgba(255,255,255,0.18);
    font-size:clamp(1.2rem,3.5vw,2.2rem);
    font-weight:300;padding-bottom:14px;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .dv{
    height:2px;
    background:linear-gradient(90deg,transparent,rgba(100,181,246,0.3),#FFCA28,rgba(100,181,246,0.3),transparent);
    width:70%;margin:0 auto clamp(12px,2vw,20px);border-radius:2px;
    position:relative;z-index:1;
  }
  .pc{
    width:80%;max-width:480px;margin:0 auto clamp(12px,2vw,18px);
    position:relative;z-index:1;
  }
  .pbg{
    height:7px;background:rgba(255,255,255,0.07);
    border-radius:10px;overflow:hidden;
    border:1px solid rgba(255,255,255,0.04);
  }
  .pf{
    height:100%;
    background:linear-gradient(90deg,#ef4444,#FFCA28);
    border-radius:10px;
    transition:width 1s ease;
    box-shadow:0 0 10px rgba(255,202,40,0.25);
  }
  .pl{display:flex;justify-content:space-between;margin-top:5px}
  .pt{
    color:rgba(255,255,255,0.4);
    font-size:clamp(0.55rem,1.1vw,0.7rem);
    font-weight:500;
  }
  .btn{
    display:inline-block;
    background:linear-gradient(135deg,#FFCA28,#FFB300);
    color:#0a0a1a;font-weight:800;
    font-size:clamp(0.8rem,1.8vw,1rem);
    padding:clamp(10px,1.8vw,14px) clamp(24px,4vw,44px);
    border-radius:50px;text-decoration:none;
    letter-spacing:1px;text-transform:uppercase;
    box-shadow:0 6px 20px rgba(255,202,40,0.25),0 0 30px rgba(255,202,40,0.08);
    transition:transform .3s,box-shadow .3s;
    cursor:pointer;border:none;
    position:relative;z-index:1;
  }
  .btn:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 10px 28px rgba(255,202,40,0.35),0 0 40px rgba(255,202,40,0.12);
  }
  .fn{
    color:rgba(255,255,255,0.3);
    font-size:clamp(0.55rem,1.2vw,0.7rem);
    margin-top:clamp(10px,2vw,16px);
    position:relative;z-index:1;
  }
  .expired .boxes{opacity:.4}
  .expired .badge span{color:#aaa}
  .expired .dot{background:#aaa;box-shadow:none;animation:none}
  .expired .badge{border-color:rgba(170,170,170,0.3);background:rgba(170,170,170,0.1)}
</style>
</head>
<body>
<div class="cw" id="widget">
  <div class="badge">
    <div class="dot"></div>
    <span>Inscription en cours</span>
  </div>
  <div class="t1">Concours de Professeurs — Session 2026</div>
  <div class="t2">دورة تكوينية للاستعداد لمباراة التوجيه و التخطيط</div>
  <div class="boxes">
    <div class="tb hl">
      <div class="num" id="d">--</div>
      <div class="lbl">Jours</div>
    </div>
    <div class="sep">:</div>
    <div class="tb">
      <div class="num" id="h">--</div>
      <div class="lbl">Heures</div>
    </div>
    <div class="sep">:</div>
    <div class="tb">
      <div class="num" id="m">--</div>
      <div class="lbl">Minutes</div>
    </div>
    <div class="sep">:</div>
    <div class="tb">
      <div class="num" id="s">--</div>
      <div class="lbl">Secondes</div>
    </div>
  </div>
  <div class="dv"></div>
  <div class="pc">
    <div class="pbg">
      <div class="pf" id="pbar" style="width:0%"></div>
    </div>
    <div class="pl">
      <span class="pt">Ouverture</span>
      <span class="pt" id="ppct">0%</span>
      <span class="pt">Clôture</span>
    </div>
  </div>
  <a href="https://concprof.com/local/pages/?id=21" class="btn" target="_top">S'inscrire maintenant</a>
  <div class="fn">Les places sont limitées — Ne manquez pas cette opportunité</div>
</div>
<script>
// ============================================
//   MODIFIEZ CES DEUX DATES UNIQUEMENT
// ============================================
var START = new Date('2026-04-15T00:00:00');
var END   = new Date('2026-05-05T23:59:59');
// ============================================

function pad(n){return n<10?'0'+n:''+n}
function tick(){
  var now=new Date(),diff=END-now;
  if(diff<=0){
    document.getElementById('d').textContent='00';
    document.getElementById('h').textContent='00';
    document.getElementById('m').textContent='00';
    document.getElementById('s').textContent='00';
    document.getElementById('pbar').style.width='100%';
    document.getElementById('ppct').textContent='Terminé';
    document.getElementById('widget').classList.add('expired');
    return;
  }
  document.getElementById('d').textContent=pad(Math.floor(diff/864e5));
  document.getElementById('h').textContent=pad(Math.floor(diff%864e5/36e5));
  document.getElementById('m').textContent=pad(Math.floor(diff%36e5/6e4));
  document.getElementById('s').textContent=pad(Math.floor(diff%6e4/1e3));
  var total=END-START,elapsed=now-START;
  var pct=Math.max(0,Math.min(100,elapsed/total*100));
  document.getElementById('pbar').style.width=pct.toFixed(1)+'%';
  document.getElementById('ppct').textContent=Math.round(pct)+'% écoulé';
}
tick();setInterval(tick,1000);
</script>
</body>
</html>
